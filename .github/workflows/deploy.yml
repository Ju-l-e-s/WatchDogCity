name: Deploy Watchdog

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.21'
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          npm install -g aws-cdk
          cd cdk && pip install -r requirements.txt
          cd ../frontend && npm install

      - name: Build Frontend
        run: |
          cd frontend
          # 1. Build CSS
          ./node_modules/.bin/tailwindcss -i input.css -o style.css -m
          
          # 2. Minify HTML
          ./node_modules/.bin/html-minifier-terser index.html --collapse-whitespace --remove-comments --minify-js true --output index.html
          
          # 3. Optimize Images (Convert PNG to WebP if missing or old)
          if [ -f "maire.png" ]; then
            convert maire.png -resize 400x400 -quality 80 maire.webp
          fi

      - name: Build Lambdas
        run: make build

      - name: Deploy to AWS
        run: |
          cd cdk
          cdk deploy --require-approval never
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: eu-west-3
