name: Deploy Watchdog

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: true
          cache-dependency-path: lambdas/**/go.sum

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: cdk/requirements.txt

      - name: Install dependencies
        run: |
          npm install -g aws-cdk
          
          # Setup Python Venv for CDK (Required by cdk.json)
          cd cdk
          python -m venv .venv
          source .venv/bin/activate
          pip install -r requirements.txt
          
          # Setup Frontend
          cd ../frontend
          npm install

      - name: Build Frontend
        run: |
          cd frontend
          # Build CSS
          ./node_modules/.bin/tailwindcss -i input.css -o style.css -m
          
          # Minify JS
          ./node_modules/.bin/terser app.js --compress --mangle --output app.js
          
          # Minify HTML
          ./node_modules/.bin/html-minifier-terser index.html --collapse-whitespace --remove-comments --minify-js true --output index.html

      - name: Build Lambdas
        run: make build

      - name: Deploy to AWS
        run: |
          cd cdk
          source .venv/bin/activate
          cdk deploy --all --require-approval never
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: eu-west-3
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          BREVO_API_KEY: ${{ secrets.BREVO_API_KEY }}
