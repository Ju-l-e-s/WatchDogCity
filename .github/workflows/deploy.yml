name: Deploy Watchdog

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true
          cache-dependency-path: lambdas/**/go.sum

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: cdk/requirements.txt

      - name: Install dependencies
        run: |
          npm install -g aws-cdk
          
          # Setup Python Venv for CDK (Required by cdk.json)
          cd cdk
          python -m venv .venv
          source .venv/bin/activate
          pip install -r requirements.txt
          
          # Setup Frontend
          cd ../frontend
          npm ci

      - name: Build Frontend
        run: |
          set -euo pipefail
          cd frontend
          npm run build

      - name: Pre-deploy guard (fail-fast)
        run: |
          set -euo pipefail
          # Block any deploy if critical assets are missing or empty.
          # Prevents the "destructive sync of an empty dir" failure mode.
          for f in frontend/index.html frontend/app.js frontend/style.css frontend/merci.html frontend/data.json; do
            if [ ! -s "$f" ]; then
              echo "::error file=$f::missing or empty — aborting deploy"
              exit 1
            fi
          done
          echo "All critical frontend assets present and non-empty."

      - name: Test Lambdas
        run: make test

      - name: Build Lambdas
        run: make build

      - name: Verify ACM certificate ARN
        run: |
          if [ -z "${ACM_CERTIFICATE_ARN:-}" ]; then
            echo "::error::ACM_CERTIFICATE_ARN is empty — refusing to deploy CloudFront without TLS cert (would break aliases)."
            exit 1
          fi
          echo "ACM_CERTIFICATE_ARN is set."
        env:
          ACM_CERTIFICATE_ARN: ${{ secrets.ACM_CERTIFICATE_ARN }}

      - name: Deploy to AWS
        run: |
          set -euo pipefail
          cd cdk
          source .venv/bin/activate
          cdk deploy --all --require-approval never
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: eu-west-3
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          BREVO_API_KEY: ${{ secrets.BREVO_API_KEY }}
          ACM_CERTIFICATE_ARN: ${{ secrets.ACM_CERTIFICATE_ARN }}
          DOMAIN_NAME: 'lobservatoiredebegles.fr'
